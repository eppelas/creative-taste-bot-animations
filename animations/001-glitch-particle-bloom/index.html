<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>#001 Glitch Particle Bloom</title>
    <style>
      :root {
        color-scheme: dark;
        --text: #f1efe8;
        --muted: #88857b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #030303;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 18px;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
        pointer-events: none;
      }

      .title {
        display: grid;
        gap: 4px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 13px;
        font-weight: 560;
        letter-spacing: 0;
      }

      p {
        max-width: 460px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .back {
        pointer-events: auto;
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(241, 239, 232, 0.18);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(12px);
      }

      @media (max-width: 680px) {
        .hud {
          align-items: start;
          flex-direction: column;
          top: 14px;
          bottom: auto;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="field"></canvas>
    <div class="hud">
      <div class="title">
        <h1>#001 Glitch Particle Bloom</h1>
        <p>
          Dark impossible-red particles orbit a noncentral mathematical bloom.
          Sparse white squares behave like calibration debris.
        </p>
      </div>
      <a class="back" href="../../index.html">Index</a>
    </div>
    <script src="../../shared/study-notes.js"></script>

    <script>
      const canvas = document.getElementById("field");
      const ctx = canvas.getContext("2d", { alpha: false });
      const particles = [];
      const squares = [];
      let width = 0;
      let height = 0;
      let dpr = 1;
      let start = performance.now();

      const TAU = Math.PI * 2;
      const rand = (min, max) => min + Math.random() * (max - min);

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        seed();
      }

      function seed() {
        particles.length = 0;
        squares.length = 0;
        const count = Math.min(1500, Math.max(620, Math.floor((width * height) / 1200)));
        for (let i = 0; i < count; i++) {
          const ring = Math.pow(Math.random(), 0.62);
          const arm = i % 9;
          particles.push({
            ring,
            arm,
            angle: rand(0, TAU),
            drift: rand(-0.018, 0.018),
            size: rand(0.45, 1.9) * (Math.random() > 0.9 ? 1.8 : 1),
            pulse: rand(0.5, 2.2),
            heat: Math.random(),
          });
        }
        for (let i = 0; i < 34; i++) {
          squares.push({
            angle: rand(0, TAU),
            radius: rand(0.08, 0.52),
            size: rand(2, 7),
            phase: rand(0, TAU),
          });
        }
      }

      function draw(now) {
        const t = (now - start) * 0.001;
        const cx = width * (0.5 + Math.sin(t * 0.17) * 0.035);
        const cy = height * (0.52 + Math.cos(t * 0.13) * 0.035);
        const scale = Math.min(width, height) * 0.72;

        ctx.fillStyle = "rgba(3, 3, 3, 0.24)";
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, scale * 0.55);
        glow.addColorStop(0, "rgba(42, 0, 5, 0.44)");
        glow.addColorStop(0.38, "rgba(10, 0, 2, 0.28)");
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = "lighter";
        for (const p of particles) {
          const armAngle = (p.arm / 9) * TAU;
          const curl = Math.sin(t * 0.42 + p.ring * 7.0) * 0.32;
          const angle = armAngle + p.angle * 0.18 + curl + t * p.drift;
          const petal = Math.sin(p.ring * Math.PI) * (0.65 + 0.25 * Math.sin(angle * 3 + t));
          const radius = scale * (0.055 + p.ring * 0.48 * petal);
          const sag = Math.pow(p.ring, 1.9) * Math.sin(armAngle + t * 0.22) * scale * 0.12;
          const jitter = Math.sin(t * p.pulse + p.angle * 13) * 3.2;
          const x = cx + Math.cos(angle) * (radius + jitter);
          const y = cy + Math.sin(angle) * radius * 0.56 + sag;
          const alpha = 0.12 + p.heat * 0.6;
          const red = Math.floor(90 + p.heat * 165);
          ctx.fillStyle = `rgba(${red}, ${Math.floor(3 + p.heat * 20)}, ${Math.floor(10 + p.heat * 32)}, ${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, TAU);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";
        for (const s of squares) {
          const breath = 0.8 + Math.sin(t * 0.9 + s.phase) * 0.2;
          const x = cx + Math.cos(s.angle + t * 0.03) * scale * s.radius;
          const y = cy + Math.sin(s.angle * 1.7 - t * 0.02) * scale * s.radius * 0.52;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(s.angle + t * 0.08);
          ctx.fillStyle = `rgba(246, 241, 222, ${0.42 + 0.38 * breath})`;
          ctx.fillRect(-s.size / 2, -s.size / 2, s.size, s.size);
          ctx.restore();
        }

        ctx.fillStyle = "rgba(255, 38, 61, 0.08)";
        for (let i = 0; i < 6; i++) {
          const y = ((t * 17 + i * 89) % height) | 0;
          ctx.fillRect(0, y, width, 1);
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize);
      resize();
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
