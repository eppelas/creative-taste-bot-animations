<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink Field Flow — Study 079</title>
    <style>
        :root {
            --bg: #f4f3ee;
            --ink: #006a4e;
            --ui: #2a2a2a;
            --accent: #d94f2a;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            cursor: none;
        }
        canvas { display: block; }
        .overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .header { display: flex; justify-content: space-between; font-size: 10px; color: var(--ui); opacity: 0.6; }
        .log { font-size: 9px; line-height: 1.4; color: var(--ui); max-width: 300px; }
        .footer { display: flex; justify-content: space-between; font-size: 10px; color: var(--ui); opacity: 0.8; }
        .status { display: flex; gap: 20px; }
        .rec-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
        .cursor {
            position: absolute; width: 30px; height: 30px;
            border: 1px dashed var(--ink); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .cursor-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
        svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <svg id="svg-layer"></svg>
    <div id="cursor" class="cursor"><div class="cursor-dot"></div></div>
    
    <div class="overlay">
        <div class="header">
            <div>STUDY_079 // INK_FIELD_FLOW</div>
            <div id="time">00:00:00</div>
        </div>
        <div id="log" class="log"></div>
        <div class="footer">
            <div class="status">
                <span><span class="rec-dot"></span> LIVE_CAPTURE</span>
                <span id="p-count">P: 0</span>
                <span id="v-count">V: 0.00</span>
            </div>
            <div>[DOUBLE_CLICK] TO RESET</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-layer');
        const logEl = document.getElementById('log');
        const timeEl = document.getElementById('time');
        const pCountEl = document.getElementById('p-count');
        const vCountEl = document.getElementById('v-count');
        const cursorEl = document.getElementById('cursor');

        let width, height;
        let particles = [];
        let strokes = [];
        let currentStroke = null;
        let mouse = { x: 0, y: 0, px: 0, py: 0, v: 0, down: false };
        let startTime = Date.now();

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', e => {
            mouse.px = mouse.x;
            mouse.py = mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.v = Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py);
            cursorEl.style.left = mouse.x + 'px';
            cursorEl.style.top = mouse.y + 'px';
            
            if (mouse.down && !currentStroke) beginStroke();
            if (currentStroke) addPoint();
        });

        window.addEventListener('mousedown', () => {
            mouse.down = true;
            beginStroke();
        });
        window.addEventListener('mouseup', () => {
            mouse.down = false;
            endStroke();
        });
        window.addEventListener('dblclick', () => {
            particles = [];
            strokes = [];
            svg.innerHTML = '';
            addLog('SYSTEM_REBOOT', 'Buffer cleared');
        });

        function beginStroke() {
            const id = Math.random().toString(16).slice(2, 6).toUpperCase();
            currentStroke = { id, points: [], bbox: null, rect: null };
            addLog('TRACKING_START', `Stroke_${id} initialized`);
        }

        function endStroke() {
            if (currentStroke) {
                addLog('TRACKING_END', `Stroke_${currentStroke.id} committed`);
                if (currentStroke.rect) {
                    currentStroke.rect.style.opacity = '0.3';
                }
                currentStroke = null;
            }
        }

        function addPoint() {
            const p = { x: mouse.x, y: mouse.y };
            currentStroke.points.push(p);
            
            // Emit particles
            const density = Math.min(10, Math.ceil(mouse.v / 2) + 2);
            for (let i = 0; i < density; i++) {
                particles.push({
                    x: mouse.x + (Math.random() - 0.5) * 40,
                    y: mouse.y + (Math.random() - 0.5) * 40,
                    vx: (mouse.x - mouse.px) * 0.1 + (Math.random() - 0.5) * 1,
                    vy: (mouse.y - mouse.py) * 0.1 + (Math.random() - 0.5) * 1 + 0.2,
                    r: Math.random() * 2 + 0.5,
                    life: 1,
                    decay: 0.005 + Math.random() * 0.01
                });
            }

            // Update SVG Bbox
            if (!currentStroke.bbox) {
                currentStroke.bbox = { x1: p.x, y1: p.y, x2: p.x, y2: p.y };
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('fill', 'none');
                rect.setAttribute('stroke', 'rgba(0,106,78,0.2)');
                rect.setAttribute('stroke-dasharray', '4 2');
                svg.appendChild(rect);
                currentStroke.rect = rect;
            } else {
                currentStroke.bbox.x1 = Math.min(currentStroke.bbox.x1, p.x);
                currentStroke.bbox.y1 = Math.min(currentStroke.bbox.y1, p.y);
                currentStroke.bbox.x2 = Math.max(currentStroke.bbox.x2, p.x);
                currentStroke.bbox.y2 = Math.max(currentStroke.bbox.y2, p.y);
                
                const b = currentStroke.bbox;
                currentStroke.rect.setAttribute('x', b.x1 - 10);
                currentStroke.rect.setAttribute('y', b.y1 - 10);
                currentStroke.rect.setAttribute('width', (b.x2 - b.x1) + 20);
                currentStroke.rect.setAttribute('height', (b.y2 - b.y1) + 20);
            }
        }

        function addLog(tag, msg) {
            const row = document.createElement('div');
            row.innerHTML = `[${tag}] ${msg}`;
            logEl.prepend(row);
            if (logEl.children.length > 8) logEl.removeChild(logEl.lastChild);
        }

        function updateUI() {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            const h = Math.floor(sec / 3600).toString().padStart(2, '0');
            const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            timeEl.textContent = `${h}:${m}:${s}`;
            pCountEl.textContent = `P: ${particles.length}`;
            vCountEl.textContent = `V: ${mouse.v.toFixed(2)}`;
        }

        function animate() {
            ctx.fillStyle = 'rgba(244, 243, 238, 0.1)';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#006a4e';
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Autonomous movement if idle
            if (!mouse.down && Date.now() - startTime > 1000) {
                const t = Date.now() * 0.001;
                const ax = width / 2 + Math.cos(t) * 200 + Math.sin(t * 0.5) * 100;
                const ay = height / 2 + Math.sin(t * 1.2) * 150;
                
                // Draw tiny "ghost" path
                ctx.fillStyle = 'rgba(0,106,78,0.05)';
                ctx.beginPath();
                ctx.arc(ax, ay, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            updateUI();
            requestAnimationFrame(animate);
        }

        addLog('INIT', 'All systems green');
        animate();
    </script>
</body>
</html>
