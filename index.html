<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creative Taste Bot — Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="view-comfortable">
    <canvas id="hero-canvas"></canvas>
    
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="shell">
      <header class="top">
        <div class="brand">
          <p class="eyebrow">Creative Taste Bot</p>
          <h1>Gallery</h1>
          <p class="description">Архив генеративных интерфейсов и визуальных исследований.</p>
        </div>
        
        <div class="controls">
          <div class="stat">
            <span class="stat-label">Total Studies</span>
            <span class="stat-value" id="count">...</span>
          </div>
          <div class="view-toggle">
            <button class="toggle-btn active" data-density="comfortable" aria-label="Comfortable view">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="toggle-btn" data-density="compact" aria-label="Compact view">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="6.5" y="2" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="6.5" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="6.5" y="6.5" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="6.5" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="6.5" y="11" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="3" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="deco-labels">
        <div class="deco-label" style="top: 25%; right: 4%;">
          <span class="line"></span><span class="text">КОНТЕКСТ</span>
        </div>
        <div class="deco-label" style="top: 50%; right: 2%;">
          <span class="line"></span><span class="text">СИСТЕМА</span>
        </div>
        <div class="deco-label" style="top: 75%; right: 6%;">
          <span class="line"></span><span class="text">РЕФЕРЕНСЫ</span>
        </div>
      </div>

      <section class="grid" id="grid"></section>
      
      <div id="error" class="error-state" hidden>
        <p>Unable to synchronize with manifest.json</p>
        <small>Please ensure you are running on a local server or via GitHub Pages.</small>
      </div>
    </main>

    <template id="card-template">
      <a class="card" href="">
        <div class="card-preview">
          <div class="iframe-container">
             <iframe src="about:blank" scrolling="no" loading="lazy"></iframe>
          </div>
          <div class="preview-overlay"></div>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="id-tag"></span>
            <span class="date"></span>
          </div>
          <h2 class="title"></h2>
          <p class="summary"></p>
        </div>
      </a>
    </template>

    <script>
      // --- Enhanced Particle Field Animation ---
      const canvas = document.getElementById('hero-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      let mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', e => {
        mouse.targetX = (e.clientX - width / 2) / 20;
        mouse.targetY = (e.clientY - height / 2) / 20;
      });
      resize();

      class Particle {
        constructor() {
          this.init();
        }
        init() {
          this.x = (Math.random() - 0.5) * 2000;
          this.y = (Math.random() - 0.5) * 2000;
          this.z = Math.random() * 2000;
          this.pz = this.z;
          this.speed = Math.random() * 2 + 0.5;
          this.isRed = Math.random() > 0.95;
        }
        update() {
          this.z -= this.speed;
          if (this.z < 1) {
            this.z = 2000;
            this.pz = this.z;
          }
          // Smooth mouse follow
          mouse.x += (mouse.targetX - mouse.x) * 0.05;
          mouse.y += (mouse.targetY - mouse.y) * 0.05;
        }
        draw() {
          const sx = (this.x / this.z) * 600 + width / 2 + mouse.x * (2000 / this.z);
          const sy = (this.y / this.z) * 600 + height / 2 + mouse.y * (2000 / this.z);
          
          // Bowl / Galaxy curve
          const dist = Math.sqrt(this.x * this.x + this.y * this.y);
          const curve = Math.pow(dist, 1.5) * 0.0001;
          const finalY = sy + curve * (1000 / this.z);

          const r = (1 - this.z / 2000) * 1.5;
          const alpha = (1 - this.z / 2000) * 0.6;

          ctx.beginPath();
          ctx.fillStyle = this.isRed ? '#ff4d4d' : '#ffffff';
          ctx.globalAlpha = alpha;
          ctx.arc(sx, finalY, r, 0, Math.PI * 2);
          ctx.fill();

          // Vertical "shutter" lines
          if (this.isRed && Math.random() > 0.98) {
            ctx.beginPath();
            ctx.strokeStyle = '#ffffff';
            ctx.globalAlpha = alpha * 0.2;
            ctx.lineWidth = 0.5;
            ctx.moveTo(sx, finalY);
            ctx.lineTo(sx, finalY - (2000 / this.z) * 50);
            ctx.stroke();
          }
        }
      }

      for (let i = 0; i < 1200; i++) particles.push(new Particle());

      function animate() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);
        
        // Background glow
        const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        grad.addColorStop(0, 'rgba(230, 74, 58, 0.05)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        particles.sort((a, b) => b.z - a.z); // Depth sort
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        requestAnimationFrame(animate);
      }
      animate();

      // --- Library Loader ---
      const grid = document.querySelector('#grid');
      const countLabel = document.querySelector('#count');
      const errorLabel = document.querySelector('#error');
      const template = document.querySelector('#card-template');
      const toggleButtons = document.querySelectorAll('.toggle-btn');

      function formatId(id) {
        const num = id.split('-')[0];
        return `Nº ${num}`;
      }

      function renderCard(item) {
        const node = template.content.cloneNode(true).querySelector('.card');
        const iframe = node.querySelector('iframe');
        const title = node.querySelector('.title');
        const summary = node.querySelector('.summary');
        const idTag = node.querySelector('.id-tag');
        const dateTag = node.querySelector('.date');

        node.href = item.path;
        title.textContent = item.title;
        summary.textContent = item.branch || 'Motion study';
        idTag.textContent = formatId(item.id);
        dateTag.textContent = item.date || '—';
        
        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) {
            iframe.src = item.path;
            observer.unobserve(node);
          }
        }, { rootMargin: '100px' });
        
        observer.observe(node);
        return node;
      }

      async function loadLibrary() {
        try {
          const response = await fetch('manifest.json', { cache: 'no-store' });
          if (!response.ok) throw new Error();
          const manifest = await response.json();
          const items = manifest.animations || [];
          
          grid.innerHTML = '';
          items.forEach(item => {
            grid.appendChild(renderCard(item));
          });
          
          countLabel.textContent = items.length;
        } catch (err) {
          errorLabel.hidden = false;
          countLabel.textContent = '0';
        }
      }

      toggleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          toggleButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.body.className = `view-${btn.dataset.density}`;
        });
      });

      loadLibrary();
    </script>
  </body>
</html>
